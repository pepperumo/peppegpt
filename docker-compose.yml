name: peppegpt

services:
  # AI Agent API Service
  agent-api:
    build: ./backend_agent_api
    container_name: agent-api
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.peppegpt-api.rule=Host(`peppegpt.giusepperumore.com`) && PathPrefix(`/api`)
      - traefik.http.routers.peppegpt-api.tls=true
      - traefik.http.routers.peppegpt-api.entrypoints=web,websecure
      - traefik.http.routers.peppegpt-api.tls.certresolver=mytlschallenge
      - traefik.http.services.peppegpt-api.loadbalancer.server.port=8001
      - traefik.docker.network=n8n_default
    networks:
      - default
      - n8n_default
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_CHOICE=${LLM_CHOICE:-gpt-4o-mini}
      - VISION_LLM_CHOICE=${VISION_LLM_CHOICE:-gpt-4o-mini}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - EMBEDDING_MODEL_CHOICE=${EMBEDDING_MODEL_CHOICE:-text-embedding-3-small}
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_AGENT_ENDPOINT: https://peppegpt.giusepperumore.com/api/pydantic-agent
        VITE_ENABLE_STREAMING: ${VITE_ENABLE_STREAMING:-true}
    container_name: frontend
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.peppegpt-frontend.rule=Host(`peppegpt.giusepperumore.com`)
      - traefik.http.routers.peppegpt-frontend.tls=true
      - traefik.http.routers.peppegpt-frontend.entrypoints=web,websecure
      - traefik.http.routers.peppegpt-frontend.tls.certresolver=mytlschallenge
      - traefik.http.services.peppegpt-frontend.loadbalancer.server.port=8080
      - traefik.docker.network=n8n_default
    networks:
      - default
      - n8n_default
    depends_on:
      - agent-api

networks:
  n8n_default:
    external: true
